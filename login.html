<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXHIE — Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <section class="form-section">
    <div class="form-box">

      <div class="form-logo">A<span>X</span>HIE.</div>
      <h2><span>Log</span>In</h2>
      <p class="subtitle">Welcome back! Please sign in to continue.</p>

      <div class="auth-error" id="authError"></div>

      <form id="loginForm">

        <div class="input-field">
          <label for="loginUser">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="loginUser" placeholder="Enter your email" autocomplete="email">
          </div>
          <div class="form-field-error" id="loginUser-err">Please enter a valid email address.</div>
        </div>

        <div class="input-field">
          <label for="loginPass">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePw('loginPass', this)" aria-label="Show password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="form-field-error" id="loginPass-err">Password is required.</div>
        </div>

        <a href="#" class="forgot-link">Forgot password?</a>

        <button type="submit" class="btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Access Account
        </button>

        <div class="separator"><span>Or sign in with</span></div>
        <div id="googleBtn"></div>

        <p class="switch-form">New to AXHIE? <a href="register.html">Create an Account</a></p>
      </form>

    </div>
  </section>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('i');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.classList.toggle('fa-eye', !isHidden);
      icon.classList.toggle('fa-eye-slash', isHidden);
    }

    function validate(id, errId, fn) {
      const el = document.getElementById(id);
      const err = document.getElementById(errId);
      const ok = fn(el.value.trim());
      el.classList.toggle('error', !ok);
      err.classList.toggle('show', !ok);
      return ok;
    }
    function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const authError = document.getElementById('authError');

    if (loginUser) loginUser.addEventListener('blur', () => validate('loginUser','loginUser-err', v => isEmail(v)));
    if (loginPass) loginPass.addEventListener('blur', () => validate('loginPass','loginPass-err', v => v.length > 0));

    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const ok = [
          validate('loginUser', 'loginUser-err', v => isEmail(v)),
          validate('loginPass', 'loginPass-err', v => v.length > 0)
        ].every(Boolean);

        if (!ok) return;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
        authError.style.display = 'none';

        const payload = {
          email: loginUser.value.trim(),
          password: loginPass.value
        };

        try {
          const response = await fetch('php/api_login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          const result = await response.json();
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Account';

          if (response.ok) {
            window.location.href = 'index.html';
          } else {
            authError.textContent = result.message || "Sign in failed.";
            authError.style.display = 'block';
          }
        } catch (error) {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Account';
          authError.textContent = "Network error: Could not reach the server.";
          authError.style.display = 'block';
        }
      });
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
